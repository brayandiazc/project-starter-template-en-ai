# ==============================================================================
# Documentation quality — ACTIVE and stack-agnostic.
# Works as is both in the template and in instantiated projects:
#   - format:       Prettier over the Markdown files.
#   - links:        relative links between docs point to real files.
#   - placeholders: in the template, every placeholder is in the
#                   TEMPLATE-USAGE.md catalog; in an instance, none remain.
#   - scripts:      the test suite for the repo's scripts and hooks.
# ==============================================================================

name: Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  format:
    name: Markdown format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Prettier --check
        run: bash .github/scripts/format-markdown.sh --check

  links:
    name: Internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check relative links
        run: bash .github/scripts/check-links.sh

  placeholders:
    name: Placeholders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check placeholders
        run: bash .github/scripts/check-placeholders.sh

  scripts:
    name: Script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Test suite
        run: bash .github/scripts/tests/run-tests.sh
