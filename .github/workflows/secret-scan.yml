# ==============================================================================
# Secret scanning — ACTIVE and stack-agnostic.
# Runs gitleaks over the history to detect leaked credentials.
# Complements the policy in SECURITY.md and docs/conventions/secrets.md.
# Note: on organization repos, gitleaks-action requires the GITLEAKS_LICENSE
# variable (free for personal accounts).
# ==============================================================================

name: Secret scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
